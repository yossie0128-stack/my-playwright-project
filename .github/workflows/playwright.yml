name: Playwright Tests + Flaky History

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --workers=1

      - name: Upload JSON test result
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-result
          path: result.json
          retention-days: 30

  flaky:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages   # ← 履歴を保存するブランチをチェックアウト

      - name: Download JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-json-result
          path: artifacts

      - name: Install deps
        run: npm ci

      - name: Run flaky analyzer
        run: node src/analyze-flaky.js

      # ★ 履歴を保存
      - name: Save history
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p history/$DATE
          cp flaky-summary.json history/$DATE/
        shell: bash

      # ★ 履歴データをまとめる（history-data.json を生成）
      - name: Generate history data
        run: node src/generate-history-data.js

      # ★ 履歴レポート（折れ線グラフ付き HTML）を生成
      - name: Generate history report
        run: node src/generate-history-report.js

      # ★ gh-pages にコミットして push
      - name: Commit & push history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update flaky history for $(date +'%Y-%m-%d')"
          branch: gh-pages
          file_pattern: history/* history-data.json history-report.html

  deploy:
    needs: flaky
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
