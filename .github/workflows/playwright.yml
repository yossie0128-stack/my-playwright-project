name: Playwright Tests + Flaky History

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --workers=1
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Check test results
        run: |
          FAILURES=$(node -e "const r=require('./result.json'); const failures = typeof r.stats?.unexpected==='number' ? r.stats.unexpected : r.suites.flatMap(s=>s.specs).flatMap(sp=>sp.tests).reduce((sum,t)=>sum + t.results.filter(rr=>rr.status!=='passed').length,0); console.log(failures);")
          if [ "$FAILURES" -gt 0 ]; then
            echo "Tests failed with $FAILURES failures"
            exit 1
          fi

       # Allureレポートを生成
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 1 

      # GitHub Pagesにデプロイ
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history