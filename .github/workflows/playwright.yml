name: Playwright Tests + Flaky History

permissions:
  contents: write
  pages: write 
  id-token: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 重複実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 15 
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1
      # root権限問題を防ぐ
      # options: --user 1001

    steps:
      - uses: actions/checkout@v6

      - name: Cache node modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          # パスを ./node_modules に明示
          path: ./node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'

        run: npm ci --prefer-offline


      - name: Run Playwright tests
        run: npx playwright test --project=chromium --workers=1
        env:
          # CI環境であることをPlaywrightに伝える
          CI: true

      # 結果をArtifactに保存
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

      - name: Get Allure history
        uses: actions/checkout@v6
        if: always()
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: gh-pages
          keep_reports: 30

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history # simple-elfのアクションが生成するディレクトリ