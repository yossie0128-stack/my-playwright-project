name: Playwright Tests + Flaky History

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --workers=1
        continue-on-error: true

      - name: Check allure results
        run: echo "Allure results:" && ls -la allure-results/ || echo "No allure-results directory"

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: .
          gh_pages: gh-pages
          keep_reports: 1 

      - name: Copy report to root
        run: |
          mv ./index.html ./redirect.html || true
          cp -r allure-report/* ./
          sed -i 's|"reportUrl":"[^"]*"|"reportUrl":"https://yossie0128-stack.github.io/my-playwright-project"|' ./executor.json 

      # GitHub Pagesにデプロイ
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .