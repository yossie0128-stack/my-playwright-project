name: Playwright Tests + Flaky History

permissions:
  contents: write
  pages: write 
  id-token: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 15 
    runs-on: ubuntu-latest
    # 全体をコンテナ化せず、テスト実行ステップのみコンテナで動かす構成が最も安定します
    
    steps:
      - uses: actions/checkout@v6

      # 1. テスト実行とレポート生成をコンテナ内で実行
      - name: Run tests and Generate Allure in Container
        uses: docker://://microsoft.com
        env:
          CI: true
        with:
          # コンテナ内で実行するコマンドを直接記述
          args: /bin/bash -c "npm ci && npx playwright test --project=chromium --workers=1 || true"

      # 2. 履歴の取得（ホスト側）
      - name: Get Allure history
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # 3. レポート生成（ホスト側で実行することで権限問題を回避）
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: gh-pages
          keep_reports: 30

      # 4. コンテナが作ったファイルの権限をホストユーザーに戻す
      - name: Fix permissions
        if: always()
        run: sudo chown -R $USER:$USER .

      # 5. デプロイ（ホスト側）
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history