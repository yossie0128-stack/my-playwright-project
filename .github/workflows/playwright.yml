name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          npx playwright test \
            --project=chromium \
            --workers=1 \
            --reporter=json \
            > result.json

      # ★ flaky 集計用の JSON をアップロード
      - name: Upload JSON test result
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-result
          path: result.json
          retention-days: 30

      # ★ Playwright の HTML レポートもアップロード（任意）
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30
