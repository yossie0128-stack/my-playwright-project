name: Playwright Tests + Flaky Score

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          npx playwright test \
            --project=chromium \
            --workers=1 \
            --reporter=json \
            > result.json

      # ★ flaky 集計用 JSON をアップロード
      - name: Upload JSON test result
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-result
          path: result.json
          retention-days: 30

      # ★ Playwright の HTML レポートもアップロード（任意）
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

  flaky:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ★ test job の artifact をダウンロード（ここが重要）
      - name: Download JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-json-result
          path: artifacts

      - name: Install deps
        run: npm ci

      # ★ flaky-summary.json を生成
      - name: Run flaky analyzer
        run: node src/analyze-flaky.js

      # ★ flaky-report.html を生成
      - name: Generate HTML report
        run: node src/generate-flaky-html.js

      # ★ JSON summary を artifact として保存
      - name: Upload flaky summary (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: flaky-summary
          path: flaky-summary.json

      # ★ HTML レポートも artifact として保存
      - name: Upload flaky HTML report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-html-report
          path: flaky-report.html
